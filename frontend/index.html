// Backend URL configuration:
//   1. window.API_URL from config.js (custom override)
//   2. localhost for dev
//   3. Production Railway backend (hardcoded default)
const API_BASE = (typeof window !== "undefined" && window.API_URL) ||
                  (location.hostname === "localhost"
                    ? "http://localhost:4000"
                    : "https://rishtaconnect-production.up.railway.app");

class APIError extends Error {
  constructor(message, status, body) {
    super(message); this.status = status; this.body = body;
  }
}

async function api(path, opts={}) {
  if (!API_BASE) {
    throw new APIError("Backend not configured. Please contact support.", 0, null);
  }
  const token = localStorage.getItem("rishta_token");
  let r;
  try {
    r = await fetch(API_BASE + path, {
      ...opts,
      headers: {
        "Content-Type":"application/json",
        ...(token ? { Authorization: "Bearer " + token } : {}),
        ...(opts.headers||{})
      },
      body: opts.body ? JSON.stringify(opts.body) : undefined
    });
  } catch(e) {
    throw new APIError("Cannot reach server. Check your internet connection.", 0, null);
  }
  let body = null;
  try { body = await r.json(); } catch(e) {}
  if (!r.ok) {
    const msg = body?.error || body?.message || r.statusText || "Request failed";
    throw new APIError(msg, r.status, body);
  }
  return body;
}

// Safe wrapper for non-critical calls that should silently fail (e.g., loading blogs)
async function apiSilent(path, opts={}) {
  try { return await api(path, opts); }
  catch(e) { console.warn("API silent fail:", path, e.message); return null; }
}

function uid(){ return "u"+Math.random().toString(36).slice(2,9); }
function compatibility(a,b){
  if(!a || !b) return 0;
  let s = 50;
  if(a.sect === b.sect) s += 10;
  if(a.country === b.country) s += 8;
  if(a.city === b.city) s += 6;
  if(a.religiousLevel === b.religiousLevel) s += 8;
  if(a.familyType === b.familyType) s += 6;
  const langOverlap = (a.languages||[]).filter(x=>(b.languages||[]).includes(x)).length;
  s += Math.min(langOverlap*3, 9);
  s = Math.min(99, Math.max(40, s + Math.floor((b.trustScore||80)/20)));
  return s;
}

}

/* ---------------- Notification Sound (Web Audio) ---------------- */
function playChime(){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type="sine"; o.frequency.value=880;
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.4);
    o.start();
    o.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime+0.15);
    o.stop(ctx.currentTime+0.45);
  } catch(e) {}
}

/* ---------------- Banner Carousel ---------------- */
function BannerCarousel({banners}){
  const [i, setI] = useState(0);
  useEffect(()=>{
    if(!banners.length) return;
    const t = setInterval(()=> setI(x=>(x+1)%banners.length), 5000);
    return ()=>clearInterval(t);
  },[banners.length]);
  if(!banners.length) return null;
  const b = banners[i];
  return (
    <section className="relative" style={{background:b.bgColor||"#0f766e"}}>
      <div className="max-w-6xl mx-auto px-5 py-8 text-white flex items-center justify-between">
        <div>
          <div className="text-2xl font-display">{b.title}</div>
          <div className="text-white/80 text-sm mt-1">{b.subtitle}</div>
        </div>
        <div className="text-5xl">{b.image||"🌙"}</div>
      </div>
      <div className="flex justify-center gap-1 pb-2">
        {banners.map((_,idx)=> <button key={idx} onClick={()=>setI(idx)} className={"w-2 h-2 rounded-full "+(idx===i?"bg-white":"bg-white/40")}/>)}
      </div>
    </section>
  );
}

/* ---------------- Contact Form ---------------- */
function ContactSection({settings}){
  const [form, setForm] = useState({ name:"", email:"", phone:"", subject:"", message:"" });
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);
  const submit = async (e)=>{
    e.preventDefault();
    if(!form.name || !form.email || !form.message) { alert("Name, email and message are required"); return; }
    setSending(true);
    const res = await apiSilent("/api/contact", { method:"POST", body: form });
    setSending(false);
    if(res?.ok) { setSent(true); setForm({ name:"", email:"", phone:"", subject:"", message:"" }); }
    else {
      // Offline fallback: save to localStorage
      const local = JSON.parse(localStorage.getItem("rishta_contacts")||"[]");
      local.push({ ...form, _id:"local-"+Date.now(), status:"new", createdAt:new Date().toISOString() });
      localStorage.setItem("rishta_contacts", JSON.stringify(local));
      setSent(true); setForm({ name:"", email:"", phone:"", subject:"", message:"" });
    }
  };
  return (
    <section id="contact" className="bg-white border-t border-gray-100">
      <div className="max-w-6xl mx-auto px-5 py-14 grid md:grid-cols-2 gap-10">
        <div>
          <h2 className="font-display text-3xl text-emerald-brand">Get in Touch</h2>
          <p className="font-urdu text-xl text-gray-600 mt-1">ہم سے رابطہ کریں</p>
          <p className="text-gray-600 mt-3">
            Have a question, suggestion or feedback? Send us a message and our team will respond within 24 hours, in sha Allah.
          </p>
          <div className="mt-5 space-y-2 text-sm">
            <div className="flex items-center gap-2">📧 <a href={"mailto:"+(settings?.contactEmail||"info@rishtaconnect.com")} className="text-emerald-brand">{settings?.contactEmail||"info@rishtaconnect.com"}</a></div>
            <div className="flex items-center gap-2">📞 {settings?.contactPhone||"+92-300-1234567"}</div>
            <div className="flex items-center gap-2">💬 WhatsApp: {settings?.whatsapp||"+92-300-1234567"}</div>
            <div className="flex items-center gap-2">📍 {settings?.address||"Lahore, Pakistan"}</div>
          </div>
          <div className="mt-4 flex gap-2">
            {settings?.facebook && <a href={settings.facebook} target="_blank" className="px-3 py-2 rounded-lg border text-sm">Facebook</a>}
            {settings?.instagram && <a href={settings.instagram} target="_blank" className="px-3 py-2 rounded-lg border text-sm">Instagram</a>}
            {settings?.twitter && <a href={settings.twitter} target="_blank" className="px-3 py-2 rounded-lg border text-sm">Twitter</a>}
            {settings?.youtube && <a href={settings.youtube} target="_blank" className="px-3 py-2 rounded-lg border text-sm">YouTube</a>}
          </div>
        </div>
        <form onSubmit={submit} className="bg-cream rounded-3xl p-6 border">
          {sent ? (
            <div className="text-center py-10">
              <div className="text-5xl">✅</div>
              <div className="font-semibold mt-2">Message Sent!</div>
              <div className="text-sm text-gray-600 mt-1">JazakAllah for reaching out. We'll respond soon.</div>
              <button type="button" onClick={()=>setSent(false)} className="mt-4 btn-primary px-4 py-2 rounded-xl">Send Another</button>
            </div>
          ) : (
            <>
              <input className="inp mb-3" placeholder="Your Name *" value={form.name} onChange={e=>setForm({...form, name:e.target.value})}/>
              <input className="inp mb-3" placeholder="Email *" type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})}/>
              <input className="inp mb-3" placeholder="Phone (optional)" value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})}/>
              <input className="inp mb-3" placeholder="Subject" value={form.subject} onChange={e=>setForm({...form, subject:e.target.value})}/>
              <textarea className="inp mb-3" rows="4" placeholder="Your message... *" value={form.message} onChange={e=>setForm({...form, message:e.target.value})}/>
              <button type="submit" disabled={sending} className="btn-primary w-full py-3 rounded-xl font-semibold">
                {sending?"Sending...":"Send Message"}
              </button>
            </>
          )}
        </form>
      </div>
    </section>
  );
}

/* ---------------- Auth (Strict & Secure) ---------------- */
function AuthScreen({mode, onAuth, onSwitch}){
  const [form, setForm] = useState({ name:"", email:"", phone:"", password:"", gender:"Male" });
  const [step, setStep] = useState("form");
  const [otp, setOtp] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [devOtp, setDevOtp] = useState(""); // shown when SMTP not configured

  // Email validator
  const isValidEmail = (e)=> /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

  const validateForm = ()=>{
    setError("");
    if (mode === "signup") {
      if (!form.name || form.name.trim().length < 2) { setError("Please enter your full name (at least 2 characters)"); return false; }
      if (!form.phone || form.phone.length < 7) { setError("Please enter a valid phone number"); return false; }
      if (!form.gender) { setError("Please select your gender"); return false; }
    }
    if (!form.email || !isValidEmail(form.email)) { setError("Please enter a valid email address"); return false; }
    if (!form.password || form.password.length < 6) { setError("Password must be at least 6 characters"); return false; }
    return true;
  };

  const onLoginSubmit = async ()=>{
    if (!validateForm()) return;
    setLoading(true); setError("");
    try {
      await onAuth(form, "login");
      // success — handled by parent
    } catch (e) {
      setError(e.message || "Invalid email or password");
    } finally {
      setLoading(false);
    }
  };

  const onSignupRequestOTP = async ()=>{
    if (!validateForm()) return;
    setLoading(true); setError(""); setDevOtp("");
    try {
      // Request OTP from backend (sends to phone/email)
      const r = await api("/api/auth/otp/send", { method:"POST", body:{ phone: form.phone, email: form.email }});
      // If SMTP not configured, backend returns the OTP for testing
      if (r?.devOtp) setDevOtp(r.devOtp);
      setStep("otp");
    } catch (e) {
      setError(e.message || "Failed to send OTP. Please try again.");
    } finally {
      setLoading(false);
    }
  };

  const onOTPVerify = async ()=>{
    setError("");
    if (!otp || otp.length !== 6) { setError("Please enter the 6-digit OTP"); return; }
    setLoading(true);
    try {
      // Verify OTP with backend
      const r = await api("/api/auth/otp/verify", { method:"POST", body:{ otp, phone: form.phone, email: form.email }});
      if (!r?.ok) { setError("Invalid OTP. Please check the code and try again."); return; }
      // OTP verified → now create the account
      await onAuth(form, "signup");
    } catch (e) {
      setError(e.message || "OTP verification failed");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen pattern-bg flex items-center justify-center p-5">
      <div className="w-full max-w-md bg-white rounded-3xl shadow-soft p-7">
        <div className="flex items-center gap-2 mb-4">
          <div className="w-10 h-10 rounded-xl gradient-hero flex items-center justify-center text-white font-bold">R</div>
          <div>
            <div className="font-display text-xl text-emerald-brand">RishtaConnect</div>
            <div className="font-urdu text-sm text-gray-500">رشتہ کنیکٹ</div>
          </div>
        </div>
        <h2 className="font-display text-2xl">{mode==="signup"?"Create Account":"Welcome Back"}</h2>
        <p className="font-urdu text-gray-600 mt-1">{mode==="signup"?"اکاؤنٹ بنائیں":"خوش آمدید"}</p>

        {error && (
          <div className="mt-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-800 text-sm flex items-start gap-2">
            <span>⚠️</span>
            <div>{error}</div>
          </div>
        )}

        {step==="form" && (
          <div className="mt-5 space-y-3">
            {mode==="signup" && (
              <>
                <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Full Name / پورا نام *" className="w-full px-4 py-3 rounded-xl border border-gray-200" autoComplete="name"/>
                <div className="grid grid-cols-2 gap-3">
                  <select value={form.gender} onChange={e=>setForm({...form, gender:e.target.value})} className="w-full px-4 py-3 rounded-xl border border-gray-200">
                    <option>Male</option><option>Female</option>
                  </select>
                  <input value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})} placeholder="Phone +92… *" className="w-full px-4 py-3 rounded-xl border border-gray-200" autoComplete="tel"/>
                </div>
              </>
            )}
            <input type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} placeholder="Email / ای میل *" className="w-full px-4 py-3 rounded-xl border border-gray-200" autoComplete={mode==="signup"?"email":"username"}/>
            <input type="password" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} placeholder="Password / پاس ورڈ * (min 6 chars)" className="w-full px-4 py-3 rounded-xl border border-gray-200" autoComplete={mode==="signup"?"new-password":"current-password"} onKeyDown={e=>{ if(e.key==="Enter") (mode==="signup" ? onSignupRequestOTP : onLoginSubmit)(); }}/>
            <button onClick={mode==="signup" ? onSignupRequestOTP : onLoginSubmit} disabled={loading} className="btn-primary w-full py-3 rounded-xl font-semibold disabled:opacity-60 disabled:cursor-not-allowed">
              {loading ? "Please wait..." : (mode==="signup" ? "Continue → Verify OTP" : "Login")}
            </button>
            {mode==="login" && (
              <div className="text-center">
                <button className="text-xs text-emerald-brand font-semibold">Forgot password?</button>
              </div>
            )}
            <div className="text-center text-xs text-gray-500">or continue with</div>
            <div className="grid grid-cols-3 gap-2">
              <button disabled className="py-2 rounded-xl border bg-gray-50 text-sm text-gray-400 cursor-not-allowed" title="Coming soon">Google</button>
              <button disabled className="py-2 rounded-xl border bg-gray-50 text-sm text-gray-400 cursor-not-allowed" title="Coming soon">Apple</button>
              <button disabled className="py-2 rounded-xl border bg-gray-50 text-sm text-gray-400 cursor-not-allowed" title="Coming soon">Phone</button>
            </div>
            <div className="text-center text-sm mt-2">
              {mode==="signup" ? (
                <span>Already have an account? <button onClick={()=>{ setError(""); onSwitch("login"); }} className="text-emerald-brand font-semibold">Login</button></span>
              ) : (
                <span>New here? <button onClick={()=>{ setError(""); onSwitch("signup"); }} className="text-emerald-brand font-semibold">Sign Up</button></span>
              )}
            </div>
            <div className="text-center text-[10px] text-gray-400 mt-2">
              🔒 Strict authentication • Encrypted • OTP-verified signup
            </div>
          </div>
        )}

        {step==="otp" && (
          <div className="mt-5 space-y-3">
            <div className="text-sm text-gray-600">
              📱 We sent a 6-digit OTP to <b>{form.phone}</b> and <b>{form.email}</b>.
              {devOtp ? (
                <div className="mt-2 p-3 bg-emerald-50 border-2 border-emerald-300 rounded-xl">
                  <div className="text-xs font-semibold text-emerald-800 mb-1">📧 Email delivery not configured yet — your OTP:</div>
                  <div className="text-center font-mono text-3xl font-bold text-emerald-700 tracking-widest my-2">{devOtp}</div>
                  <div className="text-[10px] text-emerald-700 mt-1">
                    Once SMTP credentials are added in Railway, OTPs will be emailed directly to users.
                  </div>
                </div>
              ) : (
                <div className="mt-2 text-xs bg-amber-50 border border-amber-200 rounded-lg p-2 text-amber-800">
                  ⏱️ Check your email inbox (and spam folder). OTP expires in 10 minutes.
                </div>
              )}
            </div>
            <input value={otp} onChange={e=>setOtp(e.target.value.replace(/\D/g,"").slice(0,6))} placeholder="6-digit OTP" className="w-full px-4 py-3 rounded-xl border border-gray-200 tracking-[0.5em] text-center text-2xl font-mono" autoFocus inputMode="numeric" onKeyDown={e=>{ if(e.key==="Enter") onOTPVerify(); }}/>
            <button onClick={onOTPVerify} disabled={loading || otp.length!==6} className="btn-primary w-full py-3 rounded-xl font-semibold disabled:opacity-60 disabled:cursor-not-allowed">
              {loading ? "Verifying..." : "Verify & Create Account"}
            </button>
            <div className="flex items-center justify-between text-sm">
              <button onClick={()=>{ setStep("form"); setError(""); setOtp(""); setDevOtp(""); }} className="text-gray-600">← Back</button>
              <button onClick={onSignupRequestOTP} disabled={loading} className="text-emerald-brand font-semibold">Resend OTP</button>
            </div>
            <div className="text-xs text-gray-500 text-center">🔒 2FA enabled • Encrypted • Backend-verified</div>
          </div>
        )}
      </div>
    </div>
  );
}

function ProfileSetup({initial, onSave, onCancel}){
  const [step, setStep] = useState(0);
  const [error, setError] = useState("");
  const [data, setData] = useState({
    name:initial?.name||"", age:initial?.age||"", height:"", maritalStatus:"Never Married",
    gender:initial?.gender||"Male", city:"Lahore", country:"Pakistan", nationality:"Pakistani",
    sect:"Sunni", languages:["Urdu","English"],
    qualification:"Bachelors", university:"", profession:"", company:"", income:incomeRanges[2], jobType:"Full-Time", overseas:false,
    fatherProfession:"", motherProfession:"", siblings:"", familyType:"Moderate", ownHouse:true, familyBackground:"",
    namaz:"Regular", hijab:"-", religiousLevel:"Practising",
    nature:"", hobbies:[], smoking:"No", futureGoals:"",
    preferences:{ ageRange:"22-30", city:"Any", education:"Graduate+", religious:"Practising", familyType:"Moderate", income:"Any" },
    photos:[], blurPhoto:true, bio:"", timeline:"Within 1 year",
    ...initial
  });
  const steps = ["Personal","Education","Family","Religion","Personality","Preferences","Photos & Bio"];
  const update = (k,v)=> setData(d=>({...d,[k]:v}));
  const updatePref = (k,v)=> setData(d=>({...d, preferences:{...d.preferences,[k]:v}}));

  // Required field validation per step
  const validateStep = ()=>{
    setError("");
    if (step === 0) { // Personal
      if (!data.name || data.name.trim().length < 2) return setError("Please enter your full name"), false;
      if (!data.age || data.age < 18 || data.age > 80) return setError("Please enter a valid age (18-80)"), false;
      if (!data.height) return setError("Please enter your height"), false;
      if (!data.city) return setError("Please select your city"), false;
      if (!data.country) return setError("Please select your country"), false;
    } else if (step === 1) { // Education & Career
      if (!data.qualification) return setError("Please select your qualification"), false;
      if (!data.profession) return setError("Please select your profession"), false;
      if (!data.income) return setError("Please select your monthly income"), false;
    } else if (step === 2) { // Family
      if (!data.fatherProfession) return setError("Please enter father's profession"), false;
      if (!data.motherProfession) return setError("Please enter mother's profession"), false;
      if (!data.siblings) return setError("Please describe siblings (or write 'None')"), false;
    } else if (step === 3) { // Religion
      if (!data.namaz) return setError("Please select your namaz frequency"), false;
      if (!data.religiousLevel) return setError("Please select your religious level"), false;
    } else if (step === 4) { // Personality
      if (!data.nature || data.nature.length < 5) return setError("Please describe your nature (at least 5 chars)"), false;
    } else if (step === 6) { // Photos & Bio
      if (!data.bio || data.bio.length < 20) return setError("Please write a short bio (at least 20 characters)"), false;
    }
    return true;
  };

  const handleNext = ()=>{ if (validateStep()) { setStep(step+1); setError(""); }};

  // Multi-photo upload handler
  const onPhotoSelect = (e)=>{
    const files = Array.from(e.target.files||[]);
    if (files.length === 0) return;
    const existing = data.photos || [];
    if (existing.length + files.length > 5) {
      setError("Maximum 5 photos allowed");
      return;
    }
    Promise.all(files.map(f=> new Promise((res, rej)=>{
      if (f.size > 5 * 1024 * 1024) return rej(new Error(f.name+" is larger than 5MB"));
      const reader = new FileReader();
      reader.onload = ()=> res(reader.result);
      reader.onerror = rej;
      reader.readAsDataURL(f);
    }))).then(dataUrls=>{
      update("photos", [...existing, ...dataUrls]);
      setError("");
    }).catch(e=> setError(e.message));
  };
  const removePhoto = (idx)=>{
    update("photos", (data.photos||[]).filter((_,i)=>i!==idx));
  };

  return (
    <div className="max-w-3xl mx-auto p-5 pb-28">
      <div className="bg-white rounded-2xl shadow-card p-6">
        <div className="flex items-center justify-between mb-1">
          <div>
            <h2 className="font-display text-2xl text-emerald-brand">Create Your Biodata</h2>
            <p className="font-urdu text-gray-500">اپنا بایوڈیٹا مکمل کریں</p>
          </div>
          <div className="text-sm text-gray-500">Step {step+1} / {steps.length}</div>
        </div>
        <div className="mt-3 h-2 rounded-full bg-gray-100 overflow-hidden">
          <div className="h-full bg-emerald-brand" style={{width:`${((step+1)/steps.length)*100}%`}}/>
        </div>
        <div className="mt-4 text-emerald-brand font-semibold">{steps[step]}</div>

        <div className="mt-4 space-y-3">
          {step===0 && (
            <div className="grid md:grid-cols-2 gap-3">
              <Field label="Full Name / پورا نام"><input className="inp" value={data.name} onChange={e=>update("name",e.target.value)}/></Field>
              <Field label="Date of Birth"><input type="date" className="inp" onChange={e=>{
                const age = new Date().getFullYear() - new Date(e.target.value).getFullYear();
                update("age", age);
              }}/></Field>
              <Field label="Age"><input className="inp" value={data.age} onChange={e=>update("age",e.target.value)}/></Field>
              <Field label="Gender"><select className="inp" value={data.gender} onChange={e=>update("gender",e.target.value)}><option>Male</option><option>Female</option></select></Field>
              <Field label="Height"><input className="inp" value={data.height} onChange={e=>update("height",e.target.value)} placeholder="5'8&quot;"/></Field>
              <Field label="Marital Status"><select className="inp" value={data.maritalStatus} onChange={e=>update("maritalStatus",e.target.value)}>{maritalStatuses.map(x=><option key={x}>{x}</option>)}</select></Field>
              <Field label="City"><select className="inp" value={data.city} onChange={e=>update("city",e.target.value)}>{cities.map(c=><option key={c}>{c}</option>)}</select></Field>
              <Field label="Country"><select className="inp" value={data.country} onChange={e=>update("country",e.target.value)}>{countries.map(c=><option key={c}>{c}</option>)}</select></Field>
              <Field label="Nationality"><input className="inp" value={data.nationality} onChange={e=>update("nationality",e.target.value)}/></Field>
              <Field label="Sect"><select className="inp" value={data.sect} onChange={e=>update("sect",e.target.value)}>{sects.map(s=><option key={s}>{s}</option>)}</select></Field>

              <Field label="Nature"><input className="inp" value={data.nature} onChange={e=>update("nature",e.target.value)} placeholder="Calm, family-oriented…"/></Field>
              <Field label="Hobbies (comma)"><input className="inp" value={(data.hobbies||[]).join(", ")} onChange={e=>update("hobbies",e.target.value.split(",").map(s=>s.trim()).filter(Boolean))}/></Field>
              <Field label="Smoking"><select className="inp" value={data.smoking} onChange={e=>update("smoking",e.target.value)}><option>No</option><option>Yes</option><option>Occasionally</option></select></Field>
              <Field label="Future Goals" full>
                <textarea className="inp" rows="2" value={data.futureGoals} onChange={e=>update("futureGoals",e.target.value)}/>
              </Field>
            </div>
          )}
          {step===5 && (
            <div className="grid md:grid-cols-2 gap-3">
              <Field label="Preferred Age"><input className="inp" value={data.preferences.ageRange} onChange={e=>updatePref("ageRange",e.target.value)} placeholder="24-30"/></Field>
              <Field label="Preferred City"><input className="inp" value={data.preferences.city} onChange={e=>updatePref("city",e.target.value)}/></Field>
              <Field label="Education"><input className="inp" value={data.preferences.education} onChange={e=>updatePref("education",e.target.value)}/></Field>
              <Field label="Income Range"><input className="inp" value={data.preferences.income} onChange={e=>updatePref("income",e.target.value)}/></Field>
              <Field label="Religious Expectations"><input className="inp" value={data.preferences.religious} onChange={e=>updatePref("religious",e.target.value)}/></Field>
              <Field label="Family Type"><input className="inp" value={data.preferences.familyType} onChange={e=>updatePref("familyType",e.target.value)}/></Field>
              <Field label="Marriage Timeline" full><select className="inp" value={data.timeline} onChange={e=>update("timeline",e.target.value)}><option>Ready now</option><option>Within 1 year</option><option>Just exploring</option></select></Field>
            </div>
          )}
          {step===6 && (
            <div className="space-y-4">
              <Field label="About You (Short Bio)" full>
                <textarea className="inp" rows="4" value={data.bio} onChange={e=>update("bio",e.target.value)} placeholder="Assalamu Alaikum, I am…"/>
              </Field>
              <Field label="Photo Privacy">
                <select className="inp" value={data.blurPhoto?"Blurred":"Visible"} onChange={e=>update("blurPhoto",e.target.value==="Blurred")}>
                  <option>Blurred</option><option>Visible</option>
                </select>
              </Field>
              <div className="rounded-xl border-2 border-dashed border-emerald-200 p-5 bg-emerald-50/40">
                <div className="text-center">
                  <div className="text-4xl">📷</div>
                  <div className="font-semibold mt-1">Upload Photos (max 5)</div>
                  <div className="text-xs text-gray-500 mb-3">JPG, PNG up to 5MB each. First photo is your main profile photo.</div>
                  <label className="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl btn-primary cursor-pointer text-sm font-semibold">
                    📎 Choose Photos
                    <input type="file" accept="image/*" multiple onChange={onPhotoSelect} className="hidden"/>
                  </label>
                </div>
                {(data.photos||[]).length > 0 && (
                  <div className="mt-4 grid grid-cols-3 md:grid-cols-5 gap-3">
                    {data.photos.map((src, idx)=>(
                      <div key={idx} className="relative group">
                        <img src={src} alt={"Photo "+(idx+1)} className="w-full h-24 object-cover rounded-xl border-2 border-emerald-200"/>
                        {idx === 0 && <span className="absolute top-1 left-1 chip badge-verified text-[10px]">Main</span>}
                        <button type="button" onClick={()=>removePhoto(idx)} className="absolute top-1 right-1 w-6 h-6 rounded-full bg-red-600 text-white text-xs opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                      </div>
                    ))}
                  </div>
                )}
                <div className="mt-3 flex justify-center gap-2">
                  <span className="chip bg-white border">🎙️ Voice intro (coming soon)</span>
                  <span className="chip bg-white border">🎥 Video intro (coming soon)</span>
                </div>
              </div>
            </div>
          )}
        </div>

        {error && (
          <div className="mt-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-800 text-sm flex items-start gap-2">
            <span>⚠️</span><div>{error}</div>
          </div>
        )}

        <div className="mt-6 flex items-center justify-between">
          <button onClick={()=>{ setError(""); step===0 ? onCancel?.() : setStep(step-1); }} className="px-4 py-2 rounded-xl border">{step===0?"Cancel":"Back"}</button>
          {step<steps.length-1 ? (
            <button onClick={handleNext} className="btn-primary px-5 py-2 rounded-xl font-semibold">Next</button>
          ) : (
            <button onClick={()=>{ if(validateStep()) onSave(data); }} className="btn-primary px-5 py-2 rounded-xl font-semibold">Save Biodata</button>
          )}
        </div>
      </div>
    </div>
  );
}
function Field({label, children, full}){
  return (
    <label className={"block "+(full?"md:col-span-2":"")}>
      <span className="text-xs font-semibold text-gray-600">{label}</span>
      <div className="mt-1">{children}</div>
    </label>
  );
}

/* ---------------- Search ---------------- */
function SearchView({user, users, onOpen}){

  const [q, setQ] = useState(saved?.q || "");
  const [f, setF] = useState(saved?.f || { minAge:20, maxAge:40, city:"", country:"", profession:"", sect:"", verified:false, overseas:false, marital:"" });
  const [realUsers, setRealUsers] = useState([]);
  const [loading, setLoading] = useState(true);

  // Fetch from real backend
  useEffect(()=>{
    (async ()=>{
      setLoading(true);
      const list = await apiSilent("/api/users");
      if (Array.isArray(list)) setRealUsers(list);
      setLoading(false);
    })();
  },[]);
  const [savedViews, setSavedViews] = useState(()=>{ try{ return JSON.parse(localStorage.getItem("rishta_saved_views")||"[]"); } catch { return []; } });
  const [showSaveDialog, setShowSaveDialog] = useState(false);
  const [viewName, setViewName] = useState("");

  // Persist every change
  useEffect(()=>{
    try { localStorage.setItem("rishta_filters", JSON.stringify({ q, f })); } catch(e){}
  },[q, f]);

  const saveView = ()=>{
    if(!viewName.trim()) { alert("Give this view a name"); return; }
    const v = { id: Date.now(), name: viewName.trim(), q, f };
    const next = [...savedViews, v];
    setSavedViews(next);
    localStorage.setItem("rishta_saved_views", JSON.stringify(next));
    setShowSaveDialog(false); setViewName("");
  };
  const loadView = (v)=>{ setQ(v.q); setF(v.f); };
  const deleteView = (id)=>{
    const next = savedViews.filter(v=>v.id!==id);
    setSavedViews(next);
    localStorage.setItem("rishta_saved_views", JSON.stringify(next));
  };
  const clearAll = ()=>{
    setQ(""); setF({ minAge:20, maxAge:40, city:"", country:"", profession:"", sect:"", verified:false, overseas:false, marital:"" });
  };
  const filtered = realUsers.filter(u=>{
    const uid = u.id || u._id;
    if(uid===user.id || u.gender===user.gender) return false;
    if(q && !((u.name||"")+(u.city||"")+(u.profession||"")+(u.qualification||"")).toLowerCase().includes(q.toLowerCase())) return false;
    if(u.age != null && (u.age < f.minAge || u.age > f.maxAge)) return false;
    if(f.city && u.city!==f.city) return false;
    if(f.country && u.country!==f.country) return false;
    if(f.profession && u.profession!==f.profession) return false;
    if(f.sect && u.sect!==f.sect) return false;
    if(f.verified && !u.verifications?.cnic) return false;
    if(f.overseas && !u.overseas) return false;
    if(f.marital && u.maritalStatus!==f.marital) return false;
    return true;
  }).map(u=>({...u, score:u.score || compatibility(user,u)})).sort((a,b)=>b.score-a.score);

  return (
    <div className="max-w-6xl mx-auto p-5 pb-24">
      {/* Saved Views (Smart Filters) */}
      {savedViews.length>0 && (
        <div className="bg-white rounded-2xl shadow-card p-3 mb-3">
          <div className="text-xs font-semibold text-gray-500 mb-2">💾 Saved Filter Views</div>
          <div className="flex flex-wrap gap-2">
            {savedViews.map(v=>(
              <div key={v.id} className="flex items-center gap-1 bg-emerald-50 border border-emerald-200 rounded-full pl-3 pr-1 py-1">
                <button onClick={()=>loadView(v)} className="text-sm font-medium text-emerald-700">{v.name}</button>
                <button onClick={()=>deleteView(v.id)} className="text-emerald-700 hover:text-red-600 w-5 h-5 rounded-full hover:bg-red-50 text-xs">✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
      <div className="bg-white rounded-2xl shadow-card p-4">
        <div className="flex items-center gap-2">
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search name, city, profession…" className="inp flex-1"/>
          <button onClick={()=>setShowSaveDialog(true)} className="px-3 py-2 rounded-xl border text-sm whitespace-nowrap" title="Save current filters as a view">💾 Save View</button>
          <button onClick={clearAll} className="px-3 py-2 rounded-xl border text-sm whitespace-nowrap">Clear</button>
        </div>
        {showSaveDialog && (
          <div className="mt-3 p-3 bg-emerald-50 rounded-xl border border-emerald-200">
            <div className="text-sm font-semibold mb-2">Save these filters as a smart view:</div>
            <div className="flex gap-2">
              <input value={viewName} onChange={e=>setViewName(e.target.value)} placeholder="e.g. Lahore Doctors 25-30" className="inp flex-1" autoFocus/>

          <Field label="Min Age"><input type="number" className="inp" value={f.minAge} onChange={e=>setF({...f, minAge:+e.target.value})}/></Field>

      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4 mt-2">

/* ---------------- Chat (real conversations only) ---------------- */
function ChatView({user, users, messages, sendMessage, onNav, chatTarget, clearChatTarget, fetchMessages, conversations}){
  // Fetch real users from backend if `users` is stale/empty + merge conversation partners
  const [allUsers, setAllUsers] = useState(Array.isArray(users) ? users : []);
  useEffect(()=>{
    (async ()=>{
      const list = await apiSilent("/api/users");
      const merged = Array.isArray(list) ? [...list] : [];
      // Always include conversation partners (recipients who messaged us first)
      if (Array.isArray(conversations)) {
        conversations.forEach(c=>{
          if (c.partner && !merged.find(u=>(u._id||u.id)===(c.partner._id||c.partner.id))) {
            merged.push(c.partner);
          }
        });
      }
      if (chatTarget && chatTarget.profile) {
        if (!merged.find(u=>(u._id||u.id)===chatTarget.id)) merged.push(chatTarget.profile);
      }
      setAllUsers(merged);
    })();
  },[chatTarget, conversations]);

  // Safe helper to get chatTarget user data (only when chatTarget is truthy)
  const targetUser = chatTarget && chatTarget.id && chatTarget.profile ? chatTarget : null;

  // Build conversations from THREE sources, then sort by latest message
  const myConversations = useMemo(()=>{
    const partners = new Map();
    if (Array.isArray(conversations)) {
      conversations.forEach(c=>{
        const pid = c.partner?._id || c.partner?.id;
        if (pid) partners.set(pid, c.partner);
      });
    }
    Object.keys(messages || {}).forEach(key=>{
      const [a, b] = key.split("-");
      const partnerId = a === user.id ? b : (b === user.id ? a : null);
      if (partnerId && !partners.has(partnerId)) {
        const u = allUsers.find(x=>x.id===partnerId || x._id===partnerId);
        if (u) partners.set(partnerId, u);
        else partners.set(partnerId, { _id: partnerId, name: "User" });
      }
    });
    if (targetUser && !partners.has(targetUser.id)) {
      partners.set(targetUser.id, targetUser.profile);
    }
    // Sort by latest message timestamp (newest first)
    return Array.from(partners.values()).filter(Boolean).map(u=>{
      const uid = u.id || u._id;
      const k = [user.id, uid].sort().join("-");
      const msgs = messages[k] || [];
      const last = msgs[msgs.length-1];
      return { user: u, lastTs: last?._ts || 0, lastText: last?.text || "", lastTime: last?.time };
    }).sort((a,b)=> b.lastTs - a.lastTs).map(x=> ({ ...x.user, _lastTs: x.lastTs, _lastText: x.lastText, _lastTime: x.lastTime }));
  },[conversations, messages, allUsers, user.id, targetUser]);

  // Chat search filter
  const [chatSearch, setChatSearch] = useState("");
  const filteredConversations = useMemo(()=>{
    if (!chatSearch.trim()) return myConversations;
    const q = chatSearch.toLowerCase();
    return myConversations.filter(u=>
      (u.name || "").toLowerCase().includes(q) ||
      (u.email || "").toLowerCase().includes(q) ||
      (u.city || "").toLowerCase().includes(q) ||
      (u._lastText || "").toLowerCase().includes(q)
    );
  },[myConversations, chatSearch]);

  // If chatTarget is set, prefer it as activeId; else first conversation
  const [activeId, setActiveId] = useState(targetUser?.id || myConversations[0]?.id || myConversations[0]?._id || null);
  useEffect(()=>{
    if (targetUser) setActiveId(targetUser.id);
  },[targetUser?.id]);
  // Fetch real messages when active user changes
  useEffect(()=>{
    if (activeId && fetchMessages) fetchMessages(activeId);
  },[activeId]);

  // Safely compute active user — never access .profile on null
  let active = null;
  if (activeId) {
    active = allUsers.find(u=>(u.id===activeId || u._id===activeId)) || null;
    if (!active && targetUser && targetUser.id === activeId) {
      active = targetUser.profile;
    }
  }
  const key = [user.id, activeId].sort().join("-");
  const thread = messages[key]||[];
  const [text, setText] = useState("");
  const scrollRef = useRef(null);
  useEffect(()=>{ scrollRef.current?.scrollTo(0,99999); },[thread.length, activeId]);

  // Voice recording state
  const [recording, setRecording] = useState(false);
  const recorderRef = useRef(null);
  const chunksRef = useRef([]);
  const startRecording = async ()=>{
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const recorder = new MediaRecorder(stream);
      chunksRef.current = [];
      recorder.ondataavailable = e=> chunksRef.current.push(e.data);
      recorder.onstop = ()=>{
        const blob = new Blob(chunksRef.current, { type:"audio/webm" });
        const reader = new FileReader();
        reader.onload = ()=>{
          // Send as data URL message
          sendMessage(activeId, "🎙️ Voice note\n"+reader.result);
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      recorder.start();
      recorderRef.current = recorder;
      setRecording(true);
    } catch(e) {
      alert("Microphone access denied or unavailable.");
    }
  };
  const stopRecording = ()=>{
    if (recorderRef.current && recorderRef.current.state !== "inactive") {
      recorderRef.current.stop();
    }
    setRecording(false);
  };

  // Attachment (image/file) upload
  const onAttachFile = (e)=>{
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 5*1024*1024) { alert("Max 5 MB"); return; }
    const reader = new FileReader();
    reader.onload = ()=>{
      const prefix = file.type.startsWith("image/") ? "🖼️ Image" : "📎 File: "+file.name;
      sendMessage(activeId, prefix+"\n"+reader.result);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  // EMPTY STATE — no real conversations yet (and no chat target either)
  if (myConversations.length === 0 && !targetUser) {
    return (
      <div className="max-w-3xl mx-auto p-5 pb-24">
        <div className="bg-white rounded-3xl shadow-card p-10 text-center">
          <div className="text-6xl">💬</div>
          <h2 className="font-display text-2xl mt-3 text-gray-800">No conversations yet</h2>
          <p className="font-urdu text-gray-500 mt-1">ابھی کوئی گفتگو نہیں</p>
          <p className="text-sm text-gray-600 mt-3 max-w-md mx-auto">
            Send interest to someone or message them first. Once you connect, your conversations will appear here — fully encrypted and private.
          </p>
          <div className="mt-5 flex flex-wrap gap-2 justify-center">
            <button onClick={()=>onNav?.("matches")} className="btn-primary px-5 py-2 rounded-xl">💚 Browse Matches</button>
            <button onClick={()=>onNav?.("search")} className="px-5 py-2 rounded-xl border">🔍 Search Profiles</button>
          </div>
          <div className="mt-6 text-xs text-gray-500 max-w-md mx-auto">
            🔒 All messages are end-to-end encrypted. Phone numbers stay hidden until mutual interest.
          </div>
        </div>
      </div>
    );
  }

  // Track mobile-visible panel: either "list" or "chat"
  // On desktop both visible side-by-side via md: grid; on mobile we toggle
  const [mobilePanel, setMobilePanel] = useState(activeId ? "chat" : "list");
  useEffect(()=>{
    if (activeId) setMobilePanel("chat");
  },[activeId]);

  return (
    <div className="max-w-6xl mx-auto p-0 md:p-5 pb-20 md:pb-24">
      <div className="bg-white md:rounded-2xl shadow-card overflow-hidden md:grid md:grid-cols-[300px,1fr] h-[calc(100vh-130px)] md:h-[calc(100vh-180px)] min-h-[400px]">
        {/* LEFT SIDEBAR — visible on desktop always; on mobile only when panel="list" */}
        <div className={"border-r border-gray-100 flex flex-col bg-white h-full "+(mobilePanel === "list" ? "flex" : "hidden md:flex")}>
          <div className="p-3 border-b sticky top-0 bg-white z-10 shrink-0">
            <div className="font-semibold">Conversations ({myConversations.length})</div>
            <div className="mt-2 relative">
              <input
                value={chatSearch}
                onChange={e=>setChatSearch(e.target.value)}
                placeholder="🔍 Search by name or message..."
                className="w-full px-3 py-1.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-emerald-400"
              />
              {chatSearch && (
                <button onClick={()=>setChatSearch("")} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-sm">✕</button>
              )}
            </div>
          </div>
          <div className="flex-1 min-h-0 overflow-y-auto">
            {filteredConversations.map((u, idx)=>{
              const uid = u.id || u._id;
              const k = [user.id, uid].sort().join("-");
              const msgs = messages[k] || [];
              const last = msgs[msgs.length-1];
              // Compute per-conversation unread for this partner
              const reads = JSON.parse(localStorage.getItem("rishta_msg_reads_"+user.id)||"{}");
              const lastRead = reads[uid] || 0;
              const unread = msgs.filter(m=> m.from !== user.id && (m._ts||0) > lastRead).length;
              const isActive = activeId===uid;
              const isTop = idx === 0 && filteredConversations.length > 1;
              return (
                <button key={uid} onClick={()=>{ setActiveId(uid); setMobilePanel("chat"); }} className={"w-full flex items-center gap-3 px-3 py-2.5 hover:bg-gray-50 border-b border-gray-50 transition-colors "+(isActive?"bg-emerald-50":"")+(isTop && !isActive?" bg-emerald-50/30":"")}>
                  <Avatar kind={u.gender==="Female"?"female":"male"} blur={u.blurPhoto} size={42} photo={u.photos?.[0]}/>
                  <div className="text-left flex-1 overflow-hidden">
                    <div className="flex items-center justify-between gap-2">
                      <div className={"font-semibold text-sm truncate "+(unread>0?"text-gray-900":"")}>{u.name}</div>
                      {last && <div className="text-[10px] text-gray-400 whitespace-nowrap">{last.time}</div>}
                    </div>
                    <div className="flex items-center justify-between gap-2 mt-0.5">
                      <div className={"text-xs truncate "+(unread>0?"text-gray-800 font-medium":"text-gray-500")}>
                        {last?.text?.startsWith("data:") ? "📎 Attachment" : (last?.text?.slice(0, 32) || (u.city+" • "+u.profession))}
                      </div>
                      {unread>0 && (
                        <span className="bg-emerald-500 text-white text-[10px] font-bold rounded-full min-w-[18px] h-[18px] px-1.5 flex items-center justify-center">{unread>9?"9+":unread}</span>
                      )}
                    </div>
                  </div>
                </button>
              );
            })}
            {filteredConversations.length === 0 && (
              <div className="p-4 text-center text-xs text-gray-500 italic">
                {chatSearch ? "No conversation found" : "No conversations yet"}
              </div>
            )}
          </div>
        </div>
        {/* RIGHT — header fixed, messages scroll, input fixed. Mobile: only when panel="chat" */}
        <div className={"flex flex-col h-full min-h-0 overflow-hidden "+(mobilePanel === "chat" ? "flex" : "hidden md:flex")}>
          {active ? (
            <>
              <div className="p-3 border-b flex items-center gap-3 bg-white shrink-0">
                {/* Back to list on mobile */}
                <button onClick={()=>setMobilePanel("list")} className="md:hidden text-emerald-700 -ml-1 px-1 text-xl" title="Back">←</button>
                <Avatar kind={active.gender==="Female"?"female":"male"} blur={active.blurPhoto} size={40} photo={active.photos?.[0]}/>
                <div>
                  <div className="font-semibold">{active.name}</div>
                  <div className="text-xs text-emerald-700">● Encrypted • last seen {active.lastActive||"recently"}</div>
                </div>
                <div className="ml-auto flex gap-2">
                  {/* Voice call via Jitsi (free WebRTC) */}
                  <button onClick={()=>{
                    const room = "rishta-"+[user.id, activeId].sort().join("-").slice(0,16);
                    const url = `https://meet.jit.si/${room}#config.startWithVideoMuted=true`;
                    window.open(url, "_blank");
                    sendMessage(activeId, `📞 Started a voice call — join: ${url}`);
                  }} className="px-3 py-1.5 rounded-lg border text-sm hover:bg-emerald-50" title="Voice call (Jitsi)">📞</button>
                  {/* Video call via Jitsi */}
                  <button onClick={()=>{
                    const room = "rishta-"+[user.id, activeId].sort().join("-").slice(0,16);
                    const url = `https://meet.jit.si/${room}`;
                    window.open(url, "_blank");
                    sendMessage(activeId, `🎥 Started a video call — join: ${url}`);
                  }} className="px-3 py-1.5 rounded-lg border text-sm hover:bg-emerald-50" title="Video call (Jitsi)">🎥</button>
                </div>
              </div>
              <div ref={scrollRef} className="flex-1 min-h-0 overflow-y-auto p-4 space-y-2 bg-cream">
                {thread.length===0 && <div className="text-center text-sm text-gray-500">Start the conversation respectfully. Assalamu Alaikum 🌙</div>}
                {thread.map((m,i)=>{
                  const isImage = m.text?.startsWith("🖼️ Image\ndata:image");
                  const isVoice = m.text?.startsWith("🎙️ Voice note\ndata:audio");
                  const isFile = m.text?.startsWith("📎 File:");
                  const isCall = m.text?.startsWith("📞") || m.text?.startsWith("🎥");
                  const dataUrl = (isImage || isVoice) ? m.text.split("\n")[1] : null;
                  return (
                    <div key={i} className={"flex "+(m.from===user.id?"justify-end":"justify-start")}>
                      <div className={"max-w-[75%] rounded-2xl px-3 py-2 text-sm "+(m.from===user.id?"bg-emerald-brand text-white":"bg-white border")}>
                        {isImage && dataUrl ? (
                          <img src={dataUrl} alt="attachment" className="rounded-xl max-h-64"/>
                        ) : isVoice && dataUrl ? (
                          <div>
                            <div className="text-xs opacity-80 mb-1">🎙️ Voice note</div>
                            <audio controls src={dataUrl} className="max-w-full"/>
                          </div>
                        ) : isCall ? (
                          <div>
                            {m.text.split("\n")[0]}
                            {m.text.includes("https://meet.jit.si") && (
                              <a href={m.text.match(/https:\/\/[^\s]+/)?.[0]} target="_blank"
                                className={"block mt-1 px-3 py-1.5 rounded-lg text-xs font-semibold "+(m.from===user.id?"bg-white/20 text-white":"bg-emerald-100 text-emerald-800")}>
                                Join Call →
                              </a>
                            )}
                          </div>
                        ) : (
                          <span className="whitespace-pre-line">{m.text}</span>
                        )}
                        <div className={"text-[10px] mt-0.5 "+(m.from===user.id?"text-white/70":"text-gray-400")}>{m.time}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="p-3 border-t flex items-center gap-2 bg-white shrink-0">
                <button onClick={recording ? stopRecording : startRecording} className={"px-2 py-2 rounded-lg border "+(recording?"bg-red-500 text-white animate-pulse":"")} title={recording?"Stop recording":"Voice note"}>
                  {recording ? "⏹" : "🎙️"}
                </button>
                <label className="px-2 py-2 rounded-lg border cursor-pointer hover:bg-emerald-50" title="Attach image/file">
                  📎
                  <input type="file" accept="image/*,.pdf,.doc,.docx" onChange={onAttachFile} className="hidden"/>
                </label>
                <input value={text} onChange={e=>setText(e.target.value)} placeholder="Type a respectful message…" className="inp flex-1"
                  onKeyDown={e=>{ if(e.key==="Enter" && text.trim()){ sendMessage(activeId, text); setText(""); }}}
                />
                <button onClick={()=>{ if(text.trim()){ sendMessage(activeId, text); setText(""); }}} className="btn-primary px-4 py-2 rounded-lg">Send</button>
              </div>
            </>
          ) : <div className="p-10 text-center text-gray-500">Select a conversation</div>}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Verification ---------------- */
function VerificationView({user, setUser}){
  const v = user.verifications||{};
  const update = (k)=> setUser({...user, verifications:{...v, [k]:true}, trustScore: Math.min(100,(user.trustScore||60)+(k==="cnic"||k==="face"?20:k==="family"?15:5))});
  const items = [
    { k:"phone", t:"Phone Verification", d:"OTP sent to your phone number", score:"+5", icon:"📱"},
    { k:"email", t:"Email Verification", d:"Confirm your email address", score:"+5", icon:"📧"},
    { k:"cnic", t:"CNIC Verification", d:"Upload front & back of CNIC for verification", score:"+20", icon:"🪪"},
    { k:"face", t:"Face Verification", d:"AI live selfie match with CNIC photo", score:"+20", icon:"😊"},
    { k:"family", t:"Family Verification", d:"Parent/Guardian approval call by team", score:"+15", icon:"👨‍👩‍👧"},
    { k:"business", t:"Business Verification", d:"Upload business documents (optional)", score:"+10", icon:"💼"},

  return (
    <div className="max-w-3xl mx-auto p-5 pb-24">
      <div className="bg-white rounded-2xl shadow-card p-6">
        <div className="flex items-center justify-between">
          <div>
            <h2 className="font-display text-2xl text-emerald-brand">Verification Center</h2>
            <p className="font-urdu text-gray-500">تصدیق سینٹر</p>
          </div>
          <div className="text-center">
            <CompatRing score={user.trustScore||60}/>
            <div className="text-xs text-gray-500 mt-1">Trust Score</div>
          </div>
        </div>
        <div className="mt-4 space-y-3">
          {items.map(it=>(
            <div key={it.k} className="flex items-center justify-between p-3 rounded-xl border">
              <div className="flex items-center gap-3">
                <div className="text-2xl">{it.icon}</div>
                <div>
                  <div className="font-semibold">{it.t}</div>
                  <div className="text-xs text-gray-500">{it.d}</div>
                </div>
              </div>
              <div>
                {v[it.k] ? (
                  <span className="chip badge-verified">✓ Verified</span>
                ) : (
                  <button onClick={()=>update(it.k)} className="btn-primary px-3 py-1.5 rounded-lg text-sm">Verify {it.score}</button>
                )}
              </div>
            </div>
          ))}
        </div>
        <div className="mt-4 rounded-2xl bg-emerald-50 border border-emerald-200 p-3 text-sm">
          <b>🤖 AI Fraud Detection enabled:</b> duplicate CNIC, face on multiple accounts, multi-account devices, fake images and spam behaviour are auto-flagged.
        </div>
      </div>
    </div>
  );
}

function timeAgoSimple(d){
  if (!d) return "";
  const s = Math.floor((Date.now() - new Date(d))/1000);
  if (s<60) return "now";
  if (s<3600) return Math.floor(s/60)+"m";
  if (s<86400) return Math.floor(s/3600)+"h";
  return Math.floor(s/86400)+"d";
}

/* ====================================================================

function AdminImportView({user}) {
  const [raw, setRaw] = useState("");
  const [parsed, setParsed] = useState(null);
  const [preview, setPreview] = useState(null);
  const [committing, setCommitting] = useState(false);
  const [result, setResult] = useState(null);
  const [parseErr, setParseErr] = useState("");

  const tryParse = () => {
    setParseErr("");
    try {
      const j = JSON.parse(raw);
      setParsed(j);
      return j;
    } catch (e) { setParseErr("Invalid JSON: " + e.message); setParsed(null); return null; }
  };

  const doPreview = async () => {
    const j = tryParse(); if (!j) return;
    try {
      const r = await api("/api/admin/import-users/preview", { method: "POST", body: { data: j } });
      setPreview(r);
    } catch (e) { alert("Preview failed: " + e.message); }
  };

  const doImport = async () => {
    const j = tryParse(); if (!j) return;
    if (!confirm("Import users to the live database? This action cannot be undone.")) return;
    setCommitting(true); setResult(null);
    try {
      const r = await api("/api/admin/import-users", { method: "POST", body: { data: j } });
      setResult(r);
    } catch (e) { alert("Import failed: " + e.message); }
    finally { setCommitting(false); }
  };

  const doBootstrap = async () => {
    if (!confirm("Import the 104 seed users shipped with the backend? Already-imported phones will be skipped.")) return;
    setCommitting(true); setResult(null);
    try {
      const r = await api("/api/admin/bootstrap-import", { method: "POST", body: {} });
      setResult(r);
    } catch (e) { alert("Bootstrap import failed: " + e.message); }
    finally { setCommitting(false); }
  };

  return (
    <div className="max-w-4xl mx-auto p-5 pb-24">
      <h2 className="font-display text-2xl">📥 Bulk JSON Import</h2>
      <p className="text-gray-500 text-sm mt-1">
        Paste a JSON array of profiles, preview the mapping, then commit. Urdu fields (لڑکا, کنوارا, اہلسنت, لاہور) auto-translate.
        Duplicates are skipped by phone number.
      </p>

      <div className="mt-4 grid md:grid-cols-2 gap-3">
        <button onClick={doBootstrap} disabled={committing} className="btn-primary py-3 rounded-xl disabled:opacity-50">
          🚀 Import 104 Seed Users (shipped with backend)
        </button>
        <button onClick={() => setRaw('[\n  {\n    "name": "Sana",\n    "gender": "Female",\n    "age": 24,\n    "city": "Karachi",\n    "education": "BS Textile Designing",\n    "caste": "Ansari",\n    "phone": "03240424572",\n    "maritalStatus": "Single",\n    "height": "5.4"\n  }\n]')} className="btn-gold py-3 rounded-xl">
          📋 Insert Example Template
        </button>
      </div>

      <textarea
        value={raw}
        onChange={e => setRaw(e.target.value)}
        placeholder='Paste JSON here, e.g. [{"name":"Sana","gender":"Female","phone":"03001234567",...}]'
        className="inp w-full mt-4 min-h-[260px] font-mono text-xs"
      />
      {parseErr && <div className="mt-2 text-red-600 text-sm">⚠ {parseErr}</div>}

      <div className="mt-3 flex gap-2">
        <button onClick={doPreview} disabled={!raw.trim()} className="btn-gold px-5 py-2.5 rounded-xl disabled:opacity-50">🔍 Preview</button>
        <button onClick={doImport} disabled={!raw.trim() || committing} className="btn-primary px-5 py-2.5 rounded-xl disabled:opacity-50">
          {committing ? "Importing..." : "✓ Commit Import"}
        </button>
      </div>

      {preview && (
        <div className="mt-5 bg-white rounded-2xl p-4 shadow-card">
          <div className="font-bold text-emerald-brand mb-2">Import Preview</div>
          <div className="grid grid-cols-4 gap-2">
            <ImportStat label="Total" value={preview.report?.totalIn} />
            <ImportStat label="Will Import" value={preview.willImport} color="green" />
            <ImportStat label="Duplicates" value={preview.report?.duplicates} color="amber" />
            <ImportStat label="Invalid" value={preview.report?.invalid} color="red" />
          </div>
          {preview.report?.samples?.length > 0 && (
            <div className="mt-3">
              <div className="text-xs font-semibold text-gray-600 mb-1">First 5 samples:</div>
              <div className="space-y-1 text-xs font-mono bg-cream rounded-lg p-3 max-h-72 overflow-auto">
                {preview.report.samples.map((s, i) => (
                  <div key={i} className={"py-1 " + (s.status === "ok" ? "text-emerald-700" : s.status === "duplicate" ? "text-amber-700" : "text-red-700")}>
                    [{s.status}] {s.mapped?.name || s.name || s.raw?.name} — {s.mapped?.phone || s.phone}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {result && (
        <div className="mt-5 bg-emerald-50 border-2 border-emerald-300 rounded-2xl p-5">
          <div className="text-2xl">✅</div>
          <div className="font-bold text-emerald-800 mt-2">Import Complete</div>
          <div className="grid grid-cols-3 gap-2 mt-3">
            <ImportStat label="Created" value={result.created} color="green" />
            <ImportStat label="Skipped" value={result.skipped} color="amber" />

          </div>
          {result.defaultPassword && (
            <div className="mt-3 text-sm">

              <div className="mt-1 bg-white px-3 py-2 rounded font-mono text-emerald-700 inline-block">{result.defaultPassword}</div>
              <div className="text-xs text-gray-600 mt-1">They will be forced to change this on first login.</div>
            </div>
          )}

      )}
    </div>
  );
}

/* ====================================================================
   FORCE PASSWORD CHANGE MODAL (shown on first login when mustChangePassword=true)
   ==================================================================== */
function ChangePasswordModal({user, onDone, forced=true}) {
  const [oldP, setOldP] = useState("");
  const [newP, setNewP] = useState("");
  const [confirm, setConfirm] = useState("");
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    if (newP.length < 6) return alert("New password must be at least 6 characters");
    if (newP !== confirm) return alert("Passwords do not match");
    setBusy(true);
    try {
      await api("/api/auth/change-password", {method:"POST", body:{currentPassword: forced ? undefined : oldP, newPassword: newP}});
      onDone();
    } catch (e) { alert("Failed: " + e.message); }
    finally { setBusy(false); }
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur flex items-center justify-center p-4">
      <div className="bg-white max-w-md w-full rounded-3xl p-6 shadow-soft">
        <div className="text-center">
          <div className="text-5xl">🔐</div>
          <h3 className="font-display text-2xl mt-3">{forced ? "Set Your New Password" : "Change Password"}</h3>
          {forced ? (
            <p className="text-sm text-gray-600 mt-2">
              Welcome, {user?.name || "User"}! For your security, please change the default password before continuing.
            </p>
          ) : (
            <p className="text-sm text-gray-600 mt-2">Enter your current password and choose a new one.</p>
          )}
        </div>
        <div className="mt-5 space-y-3">
          {!forced && (
            <input value={oldP} onChange={e=>setOldP(e.target.value)} type="password" placeholder="Current password" className="inp w-full"/>
          )}
          <input value={newP} onChange={e=>setNewP(e.target.value)} type="password" placeholder="New password (min 6 chars)" className="inp w-full"/>
          <input value={confirm} onChange={e=>setConfirm(e.target.value)} type="password" placeholder="Confirm new password" className="inp w-full"/>
        </div>
        <button onClick={submit} disabled={busy} className="btn-primary w-full mt-5 py-3 rounded-xl disabled:opacity-50">
          {busy ? "Updating..." : "✓ Update Password"}
        </button>
        {forced && <div className="text-xs text-amber-700 text-center mt-3">You cannot skip this step.</div>}
      </div>
    </div>
  );
}

/* ---------------- Meetings ---------------- */
function Meetings({user}){
  const [meetings, setMeetings] = useState(()=> JSON.parse(localStorage.getItem("rishta_meetings_"+user.id)||"[]"));
  const [showNew, setShowNew] = useState(false);
  const [form, setForm] = useState({ title:"", with:"", date:"", time:"", type:"google-meet", duration:30, notes:"" });

  const create = ()=>{
    if(!form.title || !form.date || !form.time){ alert("Fill required fields"); return; }
    // Auto-generate meeting link
    let link = "";
    if(form.type==="google-meet") link = "https://meet.google.com/"+Math.random().toString(36).slice(2,8)+"-"+Math.random().toString(36).slice(2,6)+"-"+Math.random().toString(36).slice(2,5);
    else if(form.type==="zoom") link = "https://zoom.us/j/"+Math.floor(Math.random()*9000000000+1000000000);
    else if(form.type==="whatsapp") link = "https://wa.me/"+(form.with.replace(/[^0-9]/g,"")||"923001234567");
    const m = { id:Date.now(), ...form, link, status:"upcoming", createdAt:new Date().toISOString() };
    const next = [...meetings, m];
    setMeetings(next);
    localStorage.setItem("rishta_meetings_"+user.id, JSON.stringify(next));
    setShowNew(false);
    setForm({ title:"", with:"", date:"", time:"", type:"google-meet", duration:30, notes:"" });
  };

  const remove = (id)=>{
    const next = meetings.filter(m=>m.id!==id);
    setMeetings(next);
    localStorage.setItem("rishta_meetings_"+user.id, JSON.stringify(next));
  };

  return (
    <div className="max-w-4xl mx-auto p-5 pb-24">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="font-display text-2xl text-emerald-brand">Meetings & Appointments</h2>
          <p className="font-urdu text-gray-500">ملاقاتیں اور اپوائنٹمنٹس</p>
        </div>
        <button onClick={()=>setShowNew(true)} className="btn-primary px-4 py-2 rounded-xl text-sm font-semibold">+ Schedule Meeting</button>
      </div>

      {showNew && (
        <div className="mt-4 bg-white rounded-2xl shadow-card p-5">
          <div className="font-semibold mb-3">New Meeting</div>
          <div className="grid md:grid-cols-2 gap-3">
            <Field label="Title *"><input className="inp" placeholder="Family introduction call" value={form.title} onChange={e=>setForm({...form, title:e.target.value})}/></Field>
            <Field label="With (name or phone)"><input className="inp" placeholder="Areeba Fatima / +92300…" value={form.with} onChange={e=>setForm({...form, with:e.target.value})}/></Field>
            <Field label="Date *"><input type="date" className="inp" value={form.date} onChange={e=>setForm({...form, date:e.target.value})}/></Field>
            <Field label="Time *"><input type="time" className="inp" value={form.time} onChange={e=>setForm({...form, time:e.target.value})}/></Field>
            <Field label="Meeting Type">
              <select className="inp" value={form.type} onChange={e=>setForm({...form, type:e.target.value})}>
                <option value="google-meet">🎥 Google Meet</option>
                <option value="zoom">📞 Zoom</option>
                <option value="whatsapp">💬 WhatsApp Video</option>
                <option value="audio">📞 Audio Call</option>
                <option value="in-person">🤝 In Person</option>
              </select>
            </Field>
            <Field label="Duration (min)"><input type="number" className="inp" value={form.duration} onChange={e=>setForm({...form, duration:+e.target.value})}/></Field>
            <Field label="Notes" full><textarea className="inp" rows="2" value={form.notes} onChange={e=>setForm({...form, notes:e.target.value})}/></Field>
          </div>
          <div className="text-xs text-gray-500 mt-2 bg-emerald-50 rounded-lg p-2">
            ✨ Meeting link will be auto-generated based on type. Calendar reminder will be sent.
          </div>
          <div className="mt-3 flex gap-2">
            <button onClick={create} className="btn-primary px-5 py-2 rounded-xl">Create Meeting</button>
            <button onClick={()=>setShowNew(false)} className="px-5 py-2 rounded-xl border">Cancel</button>
          </div>
        </div>
      )}

      <div className="mt-5 space-y-2">
        {meetings.length===0 && <div className="text-center text-gray-500 italic py-10">No meetings scheduled. Click "Schedule Meeting" to create one.</div>}
        {meetings.sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time)).map(m=>(
          <div key={m.id} className="bg-white rounded-2xl shadow-card border p-4">
            <div className="flex items-start justify-between">
              <div>
                <div className="font-semibold">{m.title}</div>
                <div className="text-sm text-gray-600 mt-0.5">📅 {m.date} at {m.time} • {m.duration} min</div>
                {m.with && <div className="text-sm text-gray-600">With: {m.with}</div>}
                {m.notes && <div className="text-xs text-gray-500 mt-1">{m.notes}</div>}
              </div>
              <span className="chip badge-verified">{m.status||"upcoming"}</span>
            </div>
            {m.link && (
              <div className="mt-2 flex flex-wrap gap-2">
                <a href={m.link} target="_blank" className="chip bg-emerald-500 text-white">🔗 Join Meeting</a>
                <button onClick={()=>{ navigator.clipboard.writeText(m.link); alert("Link copied!"); }} className="chip bg-gray-100">📋 Copy Link</button>
                <span className="chip bg-blue-50 text-blue-700">{m.type==="google-meet"?"Google Meet":m.type==="zoom"?"Zoom":m.type==="whatsapp"?"WhatsApp":m.type==="audio"?"Audio Call":"In Person"}</span>
                <button onClick={()=>remove(m.id)} className="chip bg-red-50 text-red-600 ml-auto">Cancel</button>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------------- Notifications (real user data only) ---------------- */
function Notifications({user}){
  const items = [];
  const now = Date.now();

  // Real activity feed (interests, messages, admin actions)
  const activity = JSON.parse(localStorage.getItem("rishta_activity_"+user.id)||"[]");
  activity.slice(0, 30).forEach(a=>{
    items.push({
      icon: a.icon || "🔔",
      text: a.text,
      time: timeAgo(a.time),
      tag: "activity"
    });
  });

  // Pending profile edit
  const pendingEdit = JSON.parse(localStorage.getItem("rishta_pending_edit_"+user.id)||"null");
  if (pendingEdit) {
    items.push({
      icon: "⏳", text: "Your profile edit is pending admin review",
      time: timeAgo(new Date(pendingEdit.time)), tag: "pending"
    });
  }

  // Subscription expiry warning
  if (user.planExpires) {
    const days = Math.ceil((new Date(user.planExpires) - now) / 86400000);
    if (days > 0 && days <= 7) {
      items.push({
        icon: "⏳", text: `Subscription expiring in ${days} day${days===1?"":"s"}`,
        time: "Important", tag: "subscription"
      });
    }
  }

  // Verification incomplete
  const v = user.verifications || {};
  const verifiedCount = ["phone","email","cnic","face","family","business"].filter(k=>v[k]).length;
  if (verifiedCount < 3) {
    items.push({
      icon: "🛡️", text: `Complete your verification (${verifiedCount}/6 done) to boost trust score`,
      time: "Recommended", tag: "verify"
    });
  }

  // Welcome (first-time only)
  const welcomeShown = localStorage.getItem("rishta_welcome_shown_"+user.id);
  if (!welcomeShown) {
    items.push({
      icon: "🌙", text: "Welcome to RishtaConnect! Complete your biodata to get personalized matches.",
      time: "Just now", tag: "welcome"
    });
    localStorage.setItem("rishta_welcome_shown_"+user.id, "1");
  }

  return (
    <div className="max-w-3xl mx-auto p-5 pb-24">
      <div className="bg-white rounded-2xl shadow-card p-5">
        <h2 className="font-display text-2xl text-emerald-brand">Notifications</h2>
        <p className="font-urdu text-gray-500">اطلاعات</p>
        {items.length === 0 ? (
          <div className="mt-6 text-center py-12">
            <div className="text-6xl">🔔</div>
            <div className="font-display text-xl mt-3 text-gray-700">No notifications yet</div>
            <div className="text-sm text-gray-500 mt-1">
              You'll see updates here when:
            </div>
            <ul className="mt-3 text-sm text-gray-600 max-w-sm mx-auto text-left space-y-1">
              <li>💚 Someone sends you interest</li>
              <li>💬 You receive a new message</li>
              <li>✅ Verification is approved</li>
              <li>📅 Meeting requests come in</li>
              <li>⏳ Profile edits get reviewed</li>
            </ul>
          </div>
        ) : (
          <div className="mt-3 space-y-2">
            {items.map((n,i)=>(
              <div key={i} className="flex items-center gap-3 p-3 rounded-xl border">
                <div className="text-2xl">{n.icon}</div>
                <div className="flex-1 text-sm">{n.text}</div>
                <div className="text-xs text-gray-500">{n.time}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function timeAgo(date){
  const s = Math.floor((Date.now() - new Date(date)) / 1000);
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  return Math.floor(s/86400) + "d ago";
}

function AdminLoginScreen({onAuth, onExit}){

      if (res.user.role !== "admin") {

        return;

      let r;

        r = await api("/api/messages/"+uid, { method:"POST", body:{ text: "[Admin] "+text }});

function AdminPasswordModal({user, onClose, onDone}){
  const [pw, setPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);
  const generate = ()=>{
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789";
    let s = "";
    for (let i=0;i<10;i++) s += chars[Math.floor(Math.random()*chars.length)];
    setPw(s); setConfirmPw(s);
  };
  const submit = async ()=>{
    setError("");
    if (pw.length < 6) return setError("Password must be at least 6 characters");
    if (pw !== confirmPw) return setError("Passwords do not match");
    try {
      const r = await api("/api/admin/users/"+(user._id||user.id)+"/reset-password", { method:"POST", body:{ newPassword: pw }});
      if (r?.ok) setDone(true);
      else setError("Backend did not confirm the reset. Try again.");
    } catch(e) {
      setError(e.message || "Failed to reset password. This requires the latest backend deployment.");
    }
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
      <div className="bg-white max-w-md w-full rounded-3xl p-6">
        {done ? (

          </>
        )}

      setErr(e.message || "Update failed");
    } finally {
      setSaving(false);
    }
  };
  return (
    <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
      <div className="bg-white max-w-2xl w-full rounded-3xl p-6 max-h-[92vh] overflow-y-auto">

        <div className="text-sm text-gray-500 mb-4">{user.name} — Admin changes go live immediately</div>
        <div className="grid md:grid-cols-2 gap-3">
          <Field label="Name"><input className="inp" value={d.name} onChange={e=>setD({...d, name:e.target.value})}/></Field>
          <Field label="Email"><input className="inp" value={d.email} onChange={e=>setD({...d, email:e.target.value})}/></Field>
          <Field label="Phone"><input className="inp" value={d.phone} onChange={e=>setD({...d, phone:e.target.value})}/></Field>
          <Field label="Age"><input type="number" className="inp" value={d.age} onChange={e=>setD({...d, age:+e.target.value})}/></Field>
          <Field label="City"><input className="inp" value={d.city} onChange={e=>setD({...d, city:e.target.value})}/></Field>
          <Field label="Country"><input className="inp" value={d.country} onChange={e=>setD({...d, country:e.target.value})}/></Field>
          <Field label="Profession"><input className="inp" value={d.profession} onChange={e=>setD({...d, profession:e.target.value})}/></Field>
          <Field label="Income"><input className="inp" value={d.income} onChange={e=>setD({...d, income:e.target.value})}/></Field>
          <Field label="Plan"><select className="inp" value={d.plan} onChange={e=>setD({...d, plan:e.target.value})}>
            <option>Free</option><option>Premium</option><option>VIP</option>
          </select></Field>
          <Field label="Trust Score (0-100)"><input type="number" min="0" max="100" className="inp" value={d.trustScore} onChange={e=>setD({...d, trustScore:+e.target.value})}/></Field>
          <Field label="Bio" full><textarea rows="3" className="inp" value={d.bio} onChange={e=>setD({...d, bio:e.target.value})}/></Field>
        </div>
        {err && <div className="mt-3 p-2 rounded bg-red-50 border border-red-200 text-red-800 text-sm">⚠️ {err}</div>}
        <div className="mt-5 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 rounded-xl border">Cancel</button>
          <button onClick={save} disabled={saving} className="flex-1 btn-primary py-2 rounded-xl">{saving?"Saving…":"Save Changes"}</button>
        </div>
      </div>
    </div>
  );
}
